<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Últimos Movimientos - Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 450px;">
    <h2 class="text-center mb-4 text-info">Últimos Movimientos</h2>

    <p class="text-center text-muted">Saldo actual: <strong id="currentBalance">S/ 0.00</strong></p>

    <form class="mb-3">
      <label for="filtroTipo" class="form-label">Filtrar por tipo de movimiento</label>
      <select id="filtroTipo" class="form-select">
        <option value="todos">Todos</option>
        <option value="deposito">Depósito</option>
        <option value="transferencia">Transferencia recibida</option>
        <option value="compra">Compra / Pago</option>
      </select>
    </form>

    <ul id="transactionList" class="list-group mb-4"></ul>

    <a href="menu.html" class="btn btn-primary w-100">Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Lista ficticia de transacciones de ejemplo (se combina con las reales del Local Storage)
    const listaTransacciones = [
      { desc: 'Compra en supermercado', amount: -85.50, type: 'negative', tipo: 'compra' },
      { desc: 'Transferencia recibida de Pedro Ramírez', amount: 300.00, type: 'positive', tipo: 'transferencia' },
      { desc: 'Depósito en cajero', amount: 150.00, type: 'positive', tipo: 'deposito' }
    ];

    function mostrarUltimosMovimientos(filtro) {
      const transaccionesGuardadas = getTransactions();
      const todasLasTransacciones = transaccionesGuardadas.concat(listaTransacciones);

      const $list = $('#transactionList');
      $list.empty();

      const filtradas = (filtro === 'todos')
        ? todasLasTransacciones
        : todasLasTransacciones.filter(function (t) {
            return t.tipo === filtro;
          });

      if (filtradas.length === 0) {
        $list.html('<li class="list-group-item text-muted">No hay movimientos para este filtro.</li>');
        return;
      }

      filtradas.forEach(function (t) {
        const badgeClass = t.amount >= 0 ? 'bg-success' : 'bg-danger';
        const sign = t.amount >= 0 ? '+ ' : '- ';
        const amountAbs = Math.abs(t.amount);
        const tipoLegible = getTipoTransaccion(t.tipo);

        const $li = $('<li>')
          .addClass('list-group-item d-flex justify-content-between align-items-center')
          .html(
            '<div><span>' + t.desc + '</span><br><small class="text-muted">' + tipoLegible + '</small></div>' +
            '<span class="badge ' + badgeClass + '">' + sign + formatCurrency(amountAbs) + '</span>'
          );

        $list.append($li);
      });
    }

    $(document).ready(function () {
      $('#currentBalance').text(formatCurrency(getBalance()));

      // Mostrar todos los movimientos al cargar
      mostrarUltimosMovimientos('todos');

      // Filtrar dinámicamente al cambiar el select
      $('#filtroTipo').on('change', function () {
        mostrarUltimosMovimientos($(this).val());
      });
    });
  </script>
</body>
</html>
