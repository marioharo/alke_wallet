<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Dinero - Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 480px;">
    <h2 class="text-center mb-4 text-warning">Enviar Dinero</h2>

    <p class="text-center text-muted">Saldo actual: <strong id="currentBalance">S/ 0.00</strong></p>

    <form class="mb-3" id="searchForm">
      <label for="searchContact" class="form-label">Buscar en agenda de transferencias</label>
      <div class="input-group">
        <input type="text" class="form-control" id="searchContact" placeholder="Nombre o alias">
        <button class="btn btn-warning" type="submit">Buscar</button>
      </div>
    </form>

    <div class="mb-3">
      <label class="form-label">Resultados</label>
      <ul id="contactList" class="list-group"></ul>
    </div>

    <div class="mb-3">
      <label for="sendAmount" class="form-label">Monto a enviar (S/)</label>
      <input type="number" class="form-control" id="sendAmount" placeholder="0.00" min="0.01" step="0.01">
    </div>

    <button id="btnSendMoney" class="btn btn-warning w-100 mb-2 d-none">Enviar dinero</button>

    <div id="alert-container" class="mb-2"></div>

    <button type="button" id="toggleContactForm" class="btn btn-outline-primary w-100 mb-2">
      Agregar nuevo contacto
    </button>

    <!-- Formulario de nuevo contacto (oculto por defecto) -->
    <div id="newContactFormWrapper" class="border rounded p-3 mb-2 d-none">
      <h5 class="mb-3">Agregar nuevo contacto</h5>
      <form id="newContactForm">
        <div class="mb-3">
          <label for="contactName" class="form-label">Nombre y apellido</label>
          <input type="text" class="form-control" id="contactName" placeholder="Ej: Juan Pérez">
        </div>
        <div class="mb-3">
          <label for="contactCbu" class="form-label">Número de CBU</label>
          <input type="text" class="form-control" id="contactCbu" placeholder="22 dígitos" maxlength="22">
          <div class="form-text">El CBU debe tener 22 dígitos numéricos.</div>
        </div>
        <div class="mb-3">
          <label for="contactAlias" class="form-label">Alias</label>
          <input type="text" class="form-control" id="contactAlias" placeholder="Ej: juan.perez.mp">
        </div>
        <div class="mb-3">
          <label for="contactBank" class="form-label">Nombre del Banco</label>
          <input type="text" class="form-control" id="contactBank" placeholder="Ej: Banco Nación">
        </div>
        <div id="contactFormMessage" class="mb-2"></div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-warning flex-grow-1">Guardar contacto</button>
          <button type="button" id="cancelContactForm" class="btn btn-secondary flex-grow-1">Cancelar</button>
        </div>
      </form>
    </div>

    <a href="menu.html" class="btn btn-outline-secondary w-100">Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    let selectedContact = null;

    function renderContacts(filter) {
      filter = (filter || '').trim().toLowerCase();
      const contacts = getContacts();

      const filtered = contacts.filter(function (c) {
        return c.name.toLowerCase().includes(filter) ||
               c.alias.toLowerCase().includes(filter);
      });

      const $list = $('#contactList');
      $list.empty();

      if (filtered.length === 0) {
        $list.html('<li class="list-group-item text-muted">No se encontraron contactos.</li>');
        return;
      }

      filtered.forEach(function (c) {
        const $li = $('<li>')
          .addClass('list-group-item d-flex justify-content-between align-items-center contact-item')
          .css('cursor', 'pointer')
          .html('<div><strong>' + c.name + '</strong><br><small class="text-muted">' + c.alias + ' · ' + c.bank + '</small></div>');

        $li.on('click', function () {
          $('.contact-item').removeClass('active');
          $li.addClass('active');
          selectedContact = c;
          $('#btnSendMoney').removeClass('d-none');
        });

        $list.append($li);
      });
    }

    $(document).ready(function () {
      $('#currentBalance').text(formatCurrency(getBalance()));
      renderContacts();

      // Autocompletar con jQuery UI usando nombres y alias de la agenda
      const contactos = getContacts();
      const sugerencias = contactos.map(function (c) {
        return c.name + ' (' + c.alias + ')';
      });

      $('#searchContact').autocomplete({
        source: sugerencias,
        minLength: 1,
        select: function (event, ui) {
          const nombre = ui.item.value.split(' (')[0];
          renderContacts(nombre);
        }
      });

      // Búsqueda en la agenda de transferencias
      $('#searchForm').submit(function (e) {
        e.preventDefault();
        renderContacts($('#searchContact').val());
      });

      $('#searchContact').on('input', function () {
        renderContacts($(this).val());
      });

      // Mostrar/ocultar formulario de nuevo contacto
      $('#toggleContactForm').on('click', function () {
        $('#newContactFormWrapper').toggleClass('d-none');
      });

      $('#cancelContactForm').on('click', function () {
        $('#newContactFormWrapper').addClass('d-none');
        $('#newContactForm')[0].reset();
        $('#contactFormMessage').empty();
      });

      // Validar y guardar nuevo contacto
      $('#newContactForm').submit(function (e) {
        e.preventDefault();

        const name = $('#contactName').val().trim();
        const cbu = $('#contactCbu').val().trim();
        const alias = $('#contactAlias').val().trim();
        const bank = $('#contactBank').val().trim();

        if (!name || !cbu || !alias || !bank) {
          $('#contactFormMessage').html('<div class="alert alert-danger">Completa todos los campos obligatorios.</div>');
          return;
        }

        if (!/^\d{22}$/.test(cbu)) {
          $('#contactFormMessage').html('<div class="alert alert-danger">El CBU debe tener 22 dígitos numéricos.</div>');
          return;
        }

        addContact({ name: name, cbu: cbu, alias: alias, bank: bank });

        $('#contactFormMessage').html('<div class="alert alert-success">Contacto agregado correctamente.</div>');

        renderContacts($('#searchContact').val());

        setTimeout(function () {
          $('#newContactFormWrapper').addClass('d-none');
          $('#newContactForm')[0].reset();
          $('#contactFormMessage').empty();
        }, 1000);
      });

      // Enviar dinero
      $('#btnSendMoney').on('click', function () {
        const amount = parseFloat($('#sendAmount').val());

        if (!selectedContact) {
          $('#alert-container').html('<div class="alert alert-danger">Selecciona un contacto de la lista.</div>');
          return;
        }

        if (isNaN(amount) || amount <= 0) {
          $('#alert-container').html('<div class="alert alert-danger">Ingresa un monto válido mayor a 0.</div>');
          return;
        }

        const balance = getBalance();
        if (amount > balance) {
          $('#alert-container').html('<div class="alert alert-danger">Saldo insuficiente para realizar este envío.</div>');
          return;
        }

        const newBalance = balance - amount;
        setBalance(newBalance);
        addTransaction('Envío a ' + selectedContact.name, -amount, 'compra');

        $('#currentBalance').text(formatCurrency(newBalance));
        $('#alert-container').html(
          '<div class="alert alert-success">Envío de ' + formatCurrency(amount) + ' a ' + selectedContact.name + ' realizado con éxito. Nuevo saldo: ' + formatCurrency(newBalance) + '</div>'
        );

        $('#sendAmount').val('');
        $('#btnSendMoney').addClass('d-none');
        selectedContact = null;
        $('.contact-item').removeClass('active');
      });
    });
  </script>
</body>
</html>
