<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Principal - Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="menu.html">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Últimos Movimientos</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 56px);">
  <div class="card shadow p-4 text-center" id="menuCard" style="width: 100%; max-width: 400px; display: none;">
    <h2 class="mb-3 text-primary">Menú Principal</h2>
    <div class="bg-primary text-white rounded p-3 mb-4">
      <p class="mb-1">Saldo actual</p>
      <h3 class="mb-0" id="balanceDisplay">S/ 0.00</h3>
    </div>

    <div id="alert-container" class="mb-3"></div>

    <div class="d-grid gap-3">
      <button id="btnDeposit" class="btn btn-success">Depositar</button>
      <button id="btnSend" class="btn btn-warning">Enviar Dinero</button>
      <button id="btnTransactions" class="btn btn-info">Últimos Movimientos</button>
    </div>
  </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    $(document).ready(function () {
      // Mostrar saldo actual
      $('#balanceDisplay').text(formatCurrency(getBalance()));

      // Animación de entrada para mejorar la UX
      $('#menuCard').fadeIn(600);

      function redirectWithMessage(screenName, url) {
        $('#alert-container').html(
          '<div class="alert alert-secondary">Redirigiendo a ' + screenName + '...</div>'
        );
        setTimeout(function () {
          window.location.href = url;
        }, 900);
      }

      $('#btnDeposit').on('click', function () {
        redirectWithMessage('depositar', 'deposit.html');
      });

      $('#btnSend').on('click', function () {
        redirectWithMessage('enviar dinero', 'sendmoney.html');
      });

      $('#btnTransactions').on('click', function () {
        redirectWithMessage('últimos movimientos', 'transactions.html');
      });
    });
  </script>
</body>
</html>
