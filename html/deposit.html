<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depositar - Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4 text-success">Depositar</h2>

    <p class="text-center text-muted">Saldo actual: <strong id="currentBalance">S/ 0.00</strong></p>

    <form id="depositForm">
      <div class="mb-3">
        <label for="amount" class="form-label">Monto a depositar (S/)</label>
        <input type="number" class="form-control" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
      </div>
      <button type="submit" class="btn btn-success w-100 mb-2">Realizar depósito</button>
    </form>

    <p id="depositedAmount" class="text-center text-success fw-bold mb-2"></p>

    <div id="alert-container" class="mb-2"></div>

    <a href="menu.html" class="btn btn-outline-secondary w-100">Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    $(document).ready(function () {
      // Mostrar saldo actual obtenido del Local Storage
      $('#currentBalance').text(formatCurrency(getBalance()));

      $('#depositForm').submit(function (e) {
        e.preventDefault();

        const amount = parseFloat($('#amount').val());

        if (isNaN(amount) || amount <= 0) {
          $('#alert-container').html(
            '<div class="alert alert-danger">Ingresa un monto válido mayor a 0.</div>'
          );
          return;
        }

        const newBalance = getBalance() + amount;
        setBalance(newBalance);
        addTransaction('Depósito realizado', amount, 'deposito');

        $('#currentBalance').text(formatCurrency(newBalance));

        // Leyenda con el monto depositado
        $('#depositedAmount').text('Monto depositado: ' + formatCurrency(amount));

        // Alerta de Bootstrap creada dinámicamente
        $('#alert-container').html(
          '<div class="alert alert-success">Depósito realizado con éxito. Nuevo saldo: ' + formatCurrency(newBalance) + '. Redirigiendo al menú principal...</div>'
        );

        $('#depositForm')[0].reset();

        // Redirigir al menú principal después de 2 segundos
        setTimeout(function () {
          window.location.href = 'menu.html';
        }, 2000);
      });
    });
  </script>
</body>
</html>
