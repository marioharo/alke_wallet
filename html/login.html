<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de sesión - Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4 text-primary">Inicio de sesión</h2>

    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
    </form>

    <div id="alert-container" class="mt-3"></div>

    <p class="text-muted small mt-3 mb-0 text-center">
      Demo: email <strong>usuario@wallet.com</strong> / contraseña <strong>1234</strong>
    </p>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const VALID_EMAIL = 'usuario@wallet.com';
    const VALID_PASSWORD = '1234';

    $('#loginForm').submit(function (e) {
      e.preventDefault();

      const email = $('#email').val();
      const password = $('#password').val();

      if (email === VALID_EMAIL && password === VALID_PASSWORD) {
        $('#alert-container').html(
          '<div class="alert alert-success" role="alert">Inicio de sesión exitoso. Redirigiendo...</div>'
        );
        setLoggedIn(true);
        setTimeout(function () {
          window.location.href = 'menu.html';
        }, 1200);
      } else {
        $('#alert-container').html(
          '<div class="alert alert-danger" role="alert">Email o contraseña incorrectos. Intenta nuevamente.</div>'
        );
      }
    });
  </script>
</body>
</html>
